<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Folders</title>
  <link rel="stylesheet" href="style.css">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
<div class="top-bar">
  <a href="index.html" class="back-btn">← Back</a>
</div>
<h1 class="folder-heading">Gallery Folders</h1>
<div class="filter-buttons">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="media">Media</button>
  <button class="filter-btn" data-filter="social">Social</button>
  <button class="filter-btn" data-filter="storage">Storage</button>
</div>
<div class="folders-container">
<div class="folder" data-category="media" onclick="openFolder('camera')">
  <span><i class='bx bxs-camera'></i></span>
  <h3>Camera</h3>
</div>

<div class="folder" data-category="media" onclick="openFolder('screenshots')">
  <span><i class='bx bx-screenshot'></i></span>
  <h3>Screenshots</h3>
</div>

<div class="folder" data-category="social" onclick="openFolder('whatsapp')">
  <span><i class='bx bxl-whatsapp' ></i></span>
  <h3>WhatsApp Images</h3>
</div>

<div class="folder" data-category="storage" onclick="openFolder('downloads')">
  <span><i class='bx bxs-download'></i></span>
  <h3>Downloads</h3>
</div>

<div class="folder" data-category="social" onclick="openFolder('snapchat')">
  <span><i class='bx bxl-snapchat' ></i></span>
  <h3>Snapchat</h3>
</div>

<div class="folder" data-category="media" onclick="openFolder('pictures')">
  <span><i class='bx bxs-image'></i></span>
  <h3>Pictures</h3>
</div>
<!-- 🔒 PRIVATE VAULT CARD -->
<div class="folder vault-card" onclick="openVault()" data-category="secure">
  <span class="lock-icon">
    <i class='bx bxs-lock-alt'></i>
  </span>
  <h3>Private Vault</h3>
</div>
</div>

    
    

    
    
    
    
<script src="script.js"></script>
</body>
</html>
